<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; padding: 0; }
      .splash {
        width: 2732px;
        height: 2732px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f2;
      }
      .logo {
        width: 760px;
        height: 760px;
        border-radius: 168px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #7c2d3a 0%, #5c1f2a 100%);
        box-shadow: 0 40px 120px rgba(92, 31, 42, 0.25);
      }
      .fl {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        font-size: 380px;
        line-height: 1;
        color: #faf7f2;
      }
    </style>
  </head>
  <body>
    <div class="splash"><div class="logo"><span class="fl">FL</span></div></div>
  </body>
</html>
